##################
### ANIMATIONS ###
##################
# https://wiki.hypr.land/Configuring/Variables/#animations

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 2, wind, slide
    animation = windowsIn, 1, 3, winIn, slide
    animation = windowsOut, 1, 3, winOut, slide
    animation = windowsMove, 1, 2, wind, slide
    
    animation = border, 1, 1, liner
    animation = borderangle, 0, 1, liner
    
    animation = fade, 1, 2, default
    
    animation = workspaces, 1, 2, wind
    animation = specialWorkspace, 1, 2, wind, slidevert
}
