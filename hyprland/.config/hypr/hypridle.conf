# ----------------------------------------------------- 
# Hypridle Configuration - Optimized
# ----------------------------------------------------- 

$lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend

general {
    lock_cmd = $lock_cmd                 # Command to launch the screen locker
    before_sleep_cmd = loginctl lock-session    # Lock screen before the system goes to sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn display back on after waking up
}

# 1. SCREEN LOCK (5 Minutes)
# Standard security timeout for university environments
listener {
    timeout = 300                                # 300 seconds = 5 minutes
    on-timeout = loginctl lock-session           # Execute lock command
}

# 2. DPMS CONTROL - MONITOR SLEEP (5.5 Minutes)
# Save power and reduce heat on the GTX 1650
listener {
    timeout = 330                                # 330 seconds = 5.5 minutes
    on-timeout = hyprctl dispatch dpms off       # Turn off monitor signal
    on-resume = hyprctl dispatch dpms on         # Restore monitor signal on activity
}

# 3. SYSTEM SUSPEND - AUTO SLEEP (10 Minutes)
# Final power-saving state when the laptop is idle
listener {
    timeout = 600                                # 600 seconds = 10 minutes
    on-timeout = $suspend_cmd                    # Put system into Suspend mode
}
