# --- General Settings ---
# Change Prefix from Ctrl+b to Ctrl+a (Easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1 (Default is 0)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Fix escape time delay (Crucial for Neovim)
set -s escape-time 0

# --- VIM-Style Navigation & Controls ---

# 1. Use Vim keybindings in Copy Mode
# Press Prefix + [ to enter copy mode
setw -g mode-keys vi

# Use 'v' to begin selection and 'y' to yank (copy)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 2. Switch Panes using h, j, k, l (Prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 3. Resize Panes using H, J, K, L (Prefix + Shift + h/j/k/l)
# -r flag allows repeatable key presses without hitting Prefix again
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Custom Bindings ---
# Split windows using | and -
# Ensures new panes open in the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Quick pane switching using Alt + h/j/k/l (No Prefix required)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Reload configuration file
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

# --- Appearance (UI) ---
# Status bar colors
set -g status-style bg=default,fg=white
set -g status-left "#[fg=blue,bold]#S "
set -g status-right "#[fg=yellow]%H:%M #[fg=green]%d-%b-%y"

# Highlight active window
setw -g window-status-current-style fg=black,bg=blue