# ----------------------------------------------------- 
# Hyprlock Configuration - Minimalist Monochrome Style
# ----------------------------------------------------- 

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    # Ensure your wallpaper script updates this path
    path = ~/.cache/current_wallpaper   
    color = rgba(10, 10, 10, 1.0)
    
    # Glassmorphism effect settings
    blur_passes = 2                     
    blur_size = 5
    noise = 0.0117
    contrast = 0.9
    brightness = 0.5                    # Darker background for high-contrast text
    vibrancy = 0.2
}

# --- TIME DISPLAY (BOLD MONOCHROME) ---
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)    # Pure White
    font_size = 120                     
    font_family = JetBrainsMono NF Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# --- DATE DISPLAY ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(200, 200, 200, 0.8)    # Light Gray
    font_size = 26
    font_family = JetBrainsMono NF
    position = 0, 80
    halign = center
    valign = center
}

# --- PASSWORD INPUT FIELD (PILL SHAPE) ---
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    
    # Border and Inner colors (Monochrome Theme)
    outer_color = rgba(255, 255, 255, 0.3) 
    inner_color = rgba(0, 0, 0, 0.5)       
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = false
    rounding = -1                          # Perfect pill shape
    
    # Fixed syntax: Changed ##64748B to #64748B
    placeholder_text = <span foreground="gray"><i>󰌾  Password...</i></span>
    hide_input = false
    
    check_color = rgb(255, 255, 255)       # White during check
    fail_color = rgb(255, 80, 80)          # Soft red for error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
    position = 0, -100
    halign = center
    valign = center
}
